services:
  - name: warehouse-management
    type: web
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run db:generate && npm run render-build
    startCommand: npm run db:migrate:deploy && npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-management-db
          property: connectionString

databases:
  - name: warehouse-management-db
    plan: free
    region: singapore
    databaseName: warehouse_db
    user: warehouse_user
